<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina niet gevonden - voortganginzicht.nl</title>
  <style>
    :root {
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-primary: #2563eb;
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px 20px;
      color: var(--color-text);
      background: var(--color-bg);
      font-family: var(--font-family);
    }

    main {
      width: min(100%, 520px);
      text-align: center;
    }

    .logo {
      width: min(100%, 420px);
      height: auto;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.75rem, 4vw, 2.4rem);
      line-height: 1.1;
      color: var(--color-text);
    }

    p {
      margin: 0 0 24px;
      color: var(--color-text-muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--color-primary);
      border-radius: 4px;
      color: #ffffff;
      background: var(--color-primary);
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <svg class="logo" width="520" height="64" viewBox="0 0 520 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="voortganginzicht.nl">
      <rect width="520" height="64" fill="#ffffff"></rect>
      <g transform="translate(12 18) scale(0.85)">
        <path d="M8 24 H30 M30 24 V10 M30 24 V38" stroke="#94A3B8" stroke-width="2.5" fill="none"></path>
        <path d="M30 10 H40 M30 24 H40 M30 38 H40" stroke="#94A3B8" stroke-width="2.5" fill="none"></path>
        <rect x="40" y="4" width="50" height="12" rx="3" fill="#E2E8F0"></rect>
        <rect x="40" y="18" width="65" height="12" rx="3" fill="#E2E8F0"></rect>
        <rect x="40" y="32" width="45" height="12" rx="3" fill="#E2E8F0"></rect>
        <rect x="40" y="4" width="36" height="12" rx="3" fill="#2563EB"></rect>
        <rect x="40" y="18" width="48" height="12" rx="3" fill="#3B82F6"></rect>
        <rect x="40" y="32" width="20" height="12" rx="3" fill="#60A5FA"></rect>
        <rect x="0" y="18" width="12" height="12" rx="3" fill="#2563EB"></rect>
      </g>
      <text x="110" y="50" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="600">
        <tspan fill="#1E3A8A">voortgang</tspan><tspan fill="#2563EB">inzicht</tspan><tspan fill="#1E3A8A" font-size="22">.nl</tspan>
      </text>
    </svg>
    <h1>Pagina niet gevonden</h1>
    <p>De pagina die u zoekt bestaat niet of is verplaatst.</p>
    <a href="./">Terug naar voortganginzicht.nl</a>
  </main>
</body>
</html>
