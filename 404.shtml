<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina niet gevonden / Page not found - voortganginzicht.nl</title>
  <style>
    :root {
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-primary: #2563eb;
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px 20px;
      color: var(--color-text);
      background: var(--color-bg);
      font-family: var(--font-family);
    }

    main {
      width: min(100%, 560px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo {
      display: block;
      width: min(100%, 340px);
      height: auto;
      margin: 0 auto 32px;
    }

    h1 {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 0 0 16px;
      font-size: clamp(1.75rem, 4vw, 2.4rem);
      line-height: 1.1;
      color: var(--color-text);
    }

    .copy {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }

    p {
      margin: 0;
      color: var(--color-text-muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--color-primary);
      border-radius: 4px;
      color: #ffffff;
      background: var(--color-primary);
      font-size: 0.9375rem;
      font-weight: 600;
      line-height: 1.25;
      text-align: center;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="/assets/logo.svg" width="520" height="64" alt="voortganginzicht.nl" />
    <h1>
      <span lang="nl">Pagina niet gevonden</span>
      <span lang="en">Page not found</span>
    </h1>
    <div class="copy">
      <p lang="nl">De pagina die u zoekt bestaat niet of is verplaatst.</p>
      <p lang="en">The page you are looking for does not exist or has moved.</p>
    </div>
    <a href="/" aria-label="Terug naar voortganginzicht.nl / Back to voortganginzicht.nl">
      <span lang="nl">Terug naar voortganginzicht.nl</span>
      <span aria-hidden="true">/</span>
      <span lang="en">Back to voortganginzicht.nl</span>
    </a>
  </main>
</body>
</html>
