<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>voortganginzicht.nl</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon-precomposed" href="apple-touch-icon-precomposed.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Error banner is injected by dialogs.js into document.body -->

  
  <!-- App header -->
  <header class="app-header">
    <div class="app-header__brand">
      <img
        class="app-header__logo"
        src="assets/logo.svg"
        width="520"
        height="64"
        alt="voortganginzicht.nl"
      />
    </div>
    <div class="project-name-wrap">
      <img
        class="mobile-header-mark"
        src="assets/logo.svg"
        width="520"
        height="64"
        alt="voortganginzicht.nl"
      />
      <input
        type="hidden"
        id="project-name"
      />
      <button
        type="button"
        id="project-name-display"
        class="project-name-title project-name-title--empty"
        title="Project hernoemen"
        aria-label="Project hernoemen"
      >
        <span class="project-name-title__text">Naamloos project</span>
        <svg class="project-name-title__icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 20h9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="toolbar"></div>
    <div id="lang-switcher" class="lang-switcher"></div>
    <div class="mobile-header-menu" id="mobile-header-menu">
      <button
        type="button"
        class="btn btn--icon mobile-header-menu__button"
        id="mobile-header-menu-toggle"
        aria-haspopup="menu"
        aria-expanded="false"
        aria-controls="mobile-header-menu-list"
        title="Menu"
        aria-label="Menu"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M5 7h14M5 12h14M5 17h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div
        class="mobile-header-menu__list"
        id="mobile-header-menu-list"
        role="menu"
        aria-label="Menu"
        hidden
      ></div>
    </div>
  </header>

  <!-- Two-panel main layout -->
  <main class="app-layout" id="app-layout">
    <button
      type="button"
      class="btn btn--icon tree-panel-expander"
      id="tree-panel-expand"
      aria-controls="tree-panel"
      aria-expanded="false"
      title="Werkstructuur uitklappen"
      aria-label="Werkstructuur uitklappen"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Left panel: tree editor -->
    <section class="panel panel--tree" id="tree-panel" aria-label="Boomstructuur">
      <div class="panel__header panel__header--with-action" id="tree-panel-header">
        <span class="panel__header-title-group">
          <span id="tree-panel-header-title">Werkstructuur</span>
          <button type="button" class="help-trigger" data-help-section="workStructure" aria-label="Help over werkstructuur" title="Help over werkstructuur">
            <span class="help-trigger__icon" aria-hidden="true">?</span>
          </button>
        </span>
        <button
          type="button"
          class="btn btn--icon btn--panel-toggle"
          id="tree-panel-collapse"
          aria-controls="tree-panel"
          aria-expanded="true"
          title="Werkstructuur inklappen"
          aria-label="Werkstructuur inklappen"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="panel__body">
        <div id="tree-editor"></div>
      </div>
    </section>

    <!-- Right panel: chart preview + settings drawer -->
    <section class="panel panel--chart" id="chart-panel" aria-label="Voortgangsrapport">
      <div class="panel__header panel__header--chart">
        <span class="panel__header-title-group">
          <span id="chart-panel-header">Voortgangsrapport</span>
          <button type="button" class="help-trigger" data-help-section="chart" aria-label="Help over voortgangsrapport" title="Help over voortgangsrapport">
            <span class="help-trigger__icon" aria-hidden="true">?</span>
          </button>
        </span>
        <div class="chart-header-actions">
          <div class="chart-zoom-controls" role="group" aria-label="Zoom voortgangsrapport">
            <button
              type="button"
              class="btn btn--icon chart-zoom-button"
              id="chart-zoom-out"
              title="Uitzoomen"
              aria-label="Uitzoomen"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <button
              type="button"
              class="chart-zoom-level"
              id="chart-zoom-level"
              aria-live="polite"
              title="Huidig zoomniveau: 100%"
              aria-label="Huidig zoomniveau: 100%"
            >100%</button>
            <button
              type="button"
              class="btn btn--icon chart-zoom-button"
              id="chart-zoom-in"
              title="Inzoomen"
              aria-label="Inzoomen"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <button
            type="button"
            class="btn btn--icon settings-drawer-toggle"
            id="settings-drawer-toggle"
            aria-controls="settings-drawer"
            aria-expanded="false"
            title="Instellingen openen"
            aria-label="Instellingen openen"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12.2 2h-.4a2 2 0 0 0-2 2v.2a2 2 0 0 1-1 1.7l-.4.2a2 2 0 0 1-2 0l-.2-.1a2 2 0 0 0-2.7.7l-.2.4a2 2 0 0 0 .7 2.7l.2.1a2 2 0 0 1 1 1.7v.6a2 2 0 0 1-1 1.7l-.2.1a2 2 0 0 0-.7 2.7l.2.4a2 2 0 0 0 2.7.7l.2-.1a2 2 0 0 1 2 0l.4.2a2 2 0 0 1 1 1.7v.2a2 2 0 0 0 2 2h.4a2 2 0 0 0 2-2v-.2a2 2 0 0 1 1-1.7l.4-.2a2 2 0 0 1 2 0l.2.1a2 2 0 0 0 2.7-.7l.2-.4a2 2 0 0 0-.7-2.7l-.2-.1a2 2 0 0 1-1-1.7v-.6a2 2 0 0 1 1-1.7l.2-.1a2 2 0 0 0 .7-2.7l-.2-.4a2 2 0 0 0-2.7-.7l-.2.1a2 2 0 0 1-2 0l-.4-.2a2 2 0 0 1-1-1.7V4a2 2 0 0 0-2-2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="panel__content panel__content--chart">
        <div class="panel__body">
          <div id="chart-svg-container">
            <div class="chart-placeholder">
              <p>Vul de werkstructuur in — het voortgangsrapport verschijnt automatisch.</p>
            </div>
          </div>
        </div>
        <aside class="settings-drawer" id="settings-drawer" aria-labelledby="settings-drawer-title" hidden>
          <div class="settings-drawer__header">
            <span class="panel__header-title-group">
              <h2 class="settings-drawer__title" id="settings-drawer-title">Instellingen</h2>
              <button type="button" class="help-trigger" data-help-section="settings" aria-label="Help over instellingen" title="Help over instellingen">
                <span class="help-trigger__icon" aria-hidden="true">?</span>
              </button>
            </span>
            <button
              type="button"
              class="btn btn--icon settings-drawer__close"
              id="settings-drawer-close"
              aria-controls="settings-drawer"
              title="Instellingen sluiten"
              aria-label="Instellingen sluiten"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="settings-drawer__body">
            <div id="settings-panel"></div>
          </div>
        </aside>
      </div>
    </section>

    <!-- Mobile-only panel: help as a tab -->
    <section class="panel panel--mobile-help" id="mobile-help-panel" aria-label="Help">
      <div class="panel__body">
        <div id="mobile-help-panel-content"></div>
      </div>
    </section>

  </main>

  <nav class="mobile-panel-nav" id="mobile-panel-nav" aria-label="Panelen">
    <button
      type="button"
      class="mobile-panel-nav__button"
      data-mobile-panel="tree"
      aria-controls="tree-panel"
      aria-current="page"
    >
      <svg class="mobile-panel-nav__icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M5 5h5v5H5zM14 5h5v5h-5zM14 14h5v5h-5zM10 8h2a2 2 0 0 1 2 2v1a2 2 0 0 0 2 2h1M10 8h2a2 2 0 0 1 2 2v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <span class="mobile-panel-nav__label">Werkstructuur</span>
    </button>
    <button
      type="button"
      class="mobile-panel-nav__button"
      data-mobile-panel="chart"
      aria-controls="chart-panel"
    >
      <svg class="mobile-panel-nav__icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="mobile-panel-nav__label">Rapportage</span>
    </button>
    <button
      type="button"
      class="mobile-panel-nav__button"
      data-mobile-panel="settings"
      aria-controls="settings-drawer"
    >
      <svg class="mobile-panel-nav__icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12.2 2h-.4a2 2 0 0 0-2 2v.2a2 2 0 0 1-1 1.7l-.4.2a2 2 0 0 1-2 0l-.2-.1a2 2 0 0 0-2.7.7l-.2.4a2 2 0 0 0 .7 2.7l.2.1a2 2 0 0 1 1 1.7v.6a2 2 0 0 1-1 1.7l-.2.1a2 2 0 0 0-.7 2.7l.2.4a2 2 0 0 0 2.7.7l.2-.1a2 2 0 0 1 2 0l.4.2a2 2 0 0 1 1 1.7v.2a2 2 0 0 0 2 2h.4a2 2 0 0 0 2-2v-.2a2 2 0 0 1 1-1.7l.4-.2a2 2 0 0 1 2 0l.2.1a2 2 0 0 0 2.7-.7l.2-.4a2 2 0 0 0-.7-2.7l-.2-.1a2 2 0 0 1-1-1.7v-.6a2 2 0 0 1 1-1.7l.2-.1a2 2 0 0 0 .7-2.7l-.2-.4a2 2 0 0 0-2.7-.7l-.2.1a2 2 0 0 1-2 0l-.4-.2a2 2 0 0 1-1-1.7V4a2 2 0 0 0-2-2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="mobile-panel-nav__label">Instellingen</span>
    </button>
    <button
      type="button"
      class="mobile-panel-nav__button"
      data-mobile-panel="help"
      aria-controls="mobile-help-panel"
    >
      <svg class="mobile-panel-nav__icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M9.8 9a2.4 2.4 0 0 1 4.6 1c0 1.7-2.4 2-2.4 3.6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 17h.01" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="mobile-panel-nav__label">Help</span>
    </button>
  </nav>

  <footer class="app-footer">
    <span class="app-footer__copyright">© Micha van Dijk 2026</span>
    <span class="app-footer__links">
      <a href="#contact-feedback" class="app-footer__contact-link" id="footer-contact-link" data-contact-feedback="true">Contact &amp; feedback</a>
    </span>
    <span class="app-footer__version" id="app-version"></span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
